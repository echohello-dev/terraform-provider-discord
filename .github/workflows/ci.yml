name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2
        with:
          install: true

      - name: Build
        run: mise run build

      - name: Vet
        run: mise run vet

      - name: Lint
        run: mise run lint

      - name: Test
        run: mise run test
